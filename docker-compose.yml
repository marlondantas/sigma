services:
  mysql:
    image: mysql:8.4
    container_name: sigma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sigma}
      MYSQL_USER: ${MYSQL_USER:-sigma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sigma}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sigma-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-sigma}
      DB_USER: ${MYSQL_USER:-sigma}
      DB_PASSWORD: ${MYSQL_PASSWORD:-sigma}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sigma-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mysql_data:
